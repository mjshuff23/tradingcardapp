services:
  db:
    image: postgres:16
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-tradingcarddb}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5

  garage:
    image: dxflrs/garage:v2.2.0
    restart: unless-stopped
    ports:
      - "3900:3900" # S3 API
      - "3901:3901" # RPC
      - "3902:3902" # S3 Web
      - "3903:3903" # Admin API
    volumes:
      - garage_meta:/var/lib/garage/meta
      - garage_data:/var/lib/garage/data
      - ./garage.toml:/etc/garage.toml:ro
    environment:
      - RUST_LOG=info
      - GARAGE_CONFIG_FILE=/etc/garage.toml
    command: ["/garage", "server"]
    healthcheck:
      test: ["CMD", "/garage", "status"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    restart: unless-stopped
    user: "${LOCAL_UID:-1000}:${LOCAL_GID:-1000}"
    env_file:
      - ./apps/backend/.env
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: development
      PORT: 3001
      CORS_ORIGIN: http://localhost:3000
      DATABASE_URL: postgres://postgres:postgres@db:5432/tradingcarddb
      S3_ENDPOINT: http://garage:3900
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_BUCKET: ${S3_BUCKET}
      S3_PROFILE_BUCKET: ${S3_PROFILE_BUCKET:-${S3_BUCKET}}
      S3_CARD_BUCKET: ${S3_CARD_BUCKET:-${S3_BUCKET}}
      S3_REGION: ${S3_REGION}
      CHOKIDAR_USEPOLLING: 1
    depends_on:
      db:
        condition: service_healthy
      garage:
        condition: service_started
    volumes:
      - ./:/app
      - backend_node_modules:/app/node_modules
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://localhost:3001/health', res => process.exit(res.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    restart: unless-stopped
    user: "${LOCAL_UID:-1000}:${LOCAL_GID:-1000}"
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: http://localhost:3001
      NEXT_PUBLIC_S3_ENDPOINT: http://localhost:3900
      NEXT_PUBLIC_S3_BUCKET: ${S3_BUCKET}
      CHOKIDAR_USEPOLLING: 1
      WATCHPACK_POLLING: true
    depends_on:
      backend:
        condition: service_started
    volumes:
      - ./:/app
      - frontend_node_modules:/app/node_modules

volumes:
  postgres_data:
  garage_meta:
  garage_data:
  backend_node_modules:
  frontend_node_modules:
